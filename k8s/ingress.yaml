apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookmycuts-ingress
spec:
  ingressClassName: traefik  # Modern way to specify the controller
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bookmycuts-service
            port:
              number: 5000
