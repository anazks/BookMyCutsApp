apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookmycuts-ingress
  annotations:
    # This tells Kubernetes to use the built-in Traefik "Guardian"
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bookmycuts-service
            port:
              number: 5000
