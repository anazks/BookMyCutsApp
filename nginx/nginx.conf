events {
    # connection processing configurations
    worker_connections 1024;
}

http {
    # Define our group of backend servers
    upstream api_servers {
        # App 1, 2, and 3 correspond to the service names in docker-compose.yml
        # Docker's internal networking will automatically resolve these names to their container IPs
        server app1:5000;
        server app2:5000;
        server app3:5000;
    }

    server {
        # Listen for incoming HTTP requests on port 80
        listen 80;

        location / {
            # Pass all requests to the upstream block defined above
            proxy_pass http://api_servers;
            
            # Pass along the original client information to your node backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
