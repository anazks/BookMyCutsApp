swagger: '3.0.0'
info:
  title: Booking Model API
  description: API related to Bookings models
  version: 1.0.0
paths:
  /api/booking/bookings:
    get:
      summary: Get All Bookings for User
      description: Fetch all bookings corresponding to the authenticated user
      tags:
        - User
      security:
        - JWT: []
      responses:
        200:
          description: Success response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        bookingStatus:
                          type: string
                          example: "pending"
        401:
          description: Unauthorized
        500:
          description: Server Error
